<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Student</title>
      <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Profile.css">
    <script src="Profile.js"></script>
</head>

<body>
    <header class="Login-header">
        <h1>Digital Student Portal</h1>
    </header>
    <main class="section">
        <div class="id-card">
            <div class="card-header">
                <div id="student_college">College Name</div>
            </div>

            <div class="card-body">

                <div class="profile-section">
                    <img src="" alt="Student Photo" id="img-display">
                    <button class="edit-photo-btn" id="change-photo-btn" onclick="changephoto(event)">
                        <i class="fa-solid fa-pen" id="pen-icon"></i>
                    </button>
                    <!-- <div id="edit-actions" class="notshow">
                        <button onclick="savebtn2(event)" class="btn-save">SAVE</button>
                        <button onclick="cancelEdit()" class="btn-cancel">CANCEL</button>
                    </div>
                    <input type="file" name="Student_Photo" id="Student_Photo" class="notshow"> -->
                </div>
                 <div id="edit-actions" class="notshow">
                        <button onclick="savebtn2(event)" class="btn-save" id="profilesave">SAVE</button>
                        <button onclick="cancelEdit()" class="btn-cancel" id="profilecancel" >CANCEL</button>
                    </div>
                    <input type="file" name="Student_Photo" id="Student_Photo" class="notshow">

                <div class="detail-section">
                    <div id="student_name">Name</div>
                    <input type="text" name="studentname" id="studentname" class="notshow">
                    <div id="student_rollno">USN</div>
                    <input type="text" name="studentrollno" id="studentrollno" class="notshow">
                    <div class="info-item">
                        <label>Email</label>
                        <div id="student_email"></div>
                        <input type="email" name="studentemail" id="studentemail" class="notshow">
                    </div>
                    <div class="info-item">
                        <label>Phone</label>
                        <div id="student_phone"></div>
                        <input type="text" name="studentphone" id="studentphone" class="notshow">
                    </div>
                    <div class="info-item">
                        <label>DOB</label>
                        <div id="student_dob"></div>
                        <input type="date" name="studentdob" id="studentdob" class="notshow">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-secondary full-width" id="edit-btn" onclick="editbtn(event)">EDIT
                PROFILE</button>
            <button type="submit" class="notshow" id="save-btn" onclick="savebtn(event)">SAVE CHANGES</button>

            <div class="card-footer">
                VERIFIED DIGITAL STUDENT ID |STUDENT PORTAL
            </div>
        </div>
    </main>
</body>


</html>
