<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Task.css">
    <script src="Task.js"></script>
</head>

<body>
    <header class="Login-header">
        <h1>Digital Student Portal</h1>
    </header>

    <main class="Task-container" id="maincontainer">
        <div class="Task-header-actions">
            <button id="addTaskBtn" class="axis-btn-primary" onclick="disablebtn()">+ Add New Task</button>
        </div>
<div class="task-filter-container">
    <div class="filter-group">
        <button class="filter-btn active" id="view-all" onclick="alltaskdisplay()">
            <i class="fa-solid fa-list-ul"></i> All Tasks
        </button>
        <button class="filter-btn" id="view-active" onclick="filterTasks('pending')">
            <i class="fa-solid fa-arrow-trend-up"></i> Active
        </button>
        <button class="filter-btn" id="view-completed" onclick="filterTasks('completed')">
            <i class="fa-solid fa-check-double"></i> Done
        </button>
    </div>
    <div class="task-count-badge">
        <span id="task-counter">0</span> Tasks
    </div>
</div>
        <div id="taskList" class="task-list-container"></div>

        <div id="Notaskdiv" class="Task-section-box">
            <img src="Notaskimg.png" alt="No history">
            <h2>No Task found.</h2>
            <p>Your tasks will appear here.</p>
        </div>
    </main>

    <div class="overlay" id="overlay">
        <div class="form-box">
            <h2>ADD TASK</h2>
            <form id="Form-element">
                <div class="main-input">
                    <label for="Taskname">Task Name</label>
                    <input type="text" id="Taskname" placeholder="E.g. Database Design" required>
                </div>
                
                <div class="main-input">
                    <label for="TaskDescription">Description</label>
                    <textarea id="TaskDescription" rows="3" placeholder="Additional details..."></textarea>
                </div>
                
                <div class="main-input">
                    <label for="Deadline">Deadline</label>
                    <input type="date" id="Deadline">
                </div>
                
              <div class="main-input toggle-container">
    <label class="switch">
        <input type="checkbox" id="Priority">
        <span class="slider"></span>
    </label>
    <span class="toggle-label">Mark as Priority Task</span>
</div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn-submit" onclick="Savetask(event)">Save Task</button>
                    <button type="button" class="btn-close" onclick="closeForm(event)">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="overlay" id="overlay_2">
        <div class="form-box">
            <h2>EDIT TASK</h2>
            <form id="Form-element">
                <div class="main-input">
                    <label for="Task_name">Task Name</label>
                    <input type="text" id="Task_name" placeholder="E.g. Database Design" required>
                </div>
                
                <div class="main-input">
                    <label for="Task_Description">Description</label>
                    <textarea id="Task_Description" rows="3" placeholder="Additional details..."></textarea>
                </div>
                
                <div class="main-input">
                    <label for="Dead_line">Deadline</label>
                    <input type="date" id="Dead_line">
                </div>
                
              <div class="main-input toggle-container">
    <label class="switch">
        <input type="checkbox" id="Priority_2">
        <span class="slider"></span>
    </label>
    <span class="toggle-label">Mark as Priority Task</span>
</div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn-submit" onclick="edit_task(event)">Edit Task</button>
                    <button type="button" class="btn-close" onclick="closeForm(event)">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
