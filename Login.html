<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Login.css">
    <script src="Login.js"></script>
</head>

<body>
    <header class="Login-header">
        <h1>Digital Student Portal</h1>
    </header>

    <main class="Login-container">
        <div class="Login-box">


            <form>

                <div class="input-group">
                    <label for="Student_rollno">USN:</label>
                    <input type="text" name="Student_rollno" id="Student_rollno" placeholder="Enter Your USN"
                        class="main-input" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <label for="Student_password">Password:</label>
                    <input type="password" name="Student_password" id="Student_password"
                        placeholder="Enter Your Password" class="main-input" autocomplete="off" required>
                </div>

                <button type="submit" class="btn-secondary full-width"
                    onclick="GoToProfilePage(event)">Continue</button>
            </form>
            <p class="signup-prompt">New User? <a href="RegisterPage.html">Create an account</a></p>


    </main>

</body>

</html>
