<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Student</title>
      <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="RegisterPage.css">
    <script src="RegisterPage.js"></script>
</head>

<body>
    <header class="Login-header">
        <h1>Digital Student Portal</h1>
    </header>
    <main class="SignUp-Container">
        <div class="SignupBox">
            <h1><i class="fa-solid fa-user"></i> Fill your Personal Details</h1>

            <form>
                <div class="input-group">
                    <label for="Student_name">Full Name:</label>
                    <input type="text" name="Student_name" id="Student_name" placeholder="Enter Your  Name"
                        class="main-input" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <label for="Student_rollno">USN:</label>
                    <input type="text" name="Student_rollno" id="Student_rollno" placeholder="Enter Your USN"
                        class="main-input" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <label for="Student_email">Personal Email:</label>
                    <input type="email" name="Student_email" id="Student_email" placeholder="Enter Your Email"
                        class="main-input" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <label for="Student_no">Phone Number:</label>
                    <input type="text" name="Student_no" id="Student_no" placeholder="Enter Your Phone Number"
                        class="main-input" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <label for="Student_dob">DOB:</label>
                    <input type="date" name="Student_dob" id="Student_dob" class="main-input" autocomplete="off"
                        required>
                </div>

                <div class="input-group">
                    <label for="cars">Choose a College:</label>
                    <select id="College_name" name="College_name" class="main-input" autocomplete="off">
                        <option value="Select a College">Select a College</option>
                        <option value="RV College of Engineering">RV College of Engineering</option>
                        <option value="BMS College of Engineering">BMS College of Engineering</option>
                        <option value="Ramaiah Institute of Technology">Ramaiah Institute of Technology</option>
                        <option value="Bangalore Institute of Technology">Bangalore Institute of Technology</option>
                        <option value="Dayananda Sagar College of Engineering">Dayananda Sagar College of Engineering
                        </option>
                        <option value="National Institute of Technology, Surathkal">National Institute of Technology,
                            Surathkal</option>
                        <option value="National Institute of Engineering, Mysore">National Institute of Engineering,
                            Mysore</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="Student_img">Profile Image:</label>
                    <input type="file" name="Student_img" id="Student_img" class="main-input" autocomplete="off"
                        required>
                </div>

                <div class="input-group">
                    <label for="Student_password">Password:</label>
                    <input type="password" name="Student_password" id="Student_password"
                        placeholder="Enter Your Password" class="main-input" autocomplete="off" required>
                </div>

                <button type="submit" class="btn-secondary full-width" onclick="GotoLoginPage(event)">Continue</button>
            </form>
        </div>
    </main>
</body>


</html>
